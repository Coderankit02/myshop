<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Email Verified – Rinku Kirana Store</title>
  <link rel="manifest" href="/manifest.json"/>
  <meta name="theme-color" content="#15803D"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Rinku Kirana"/>
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png"/>
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png"/>
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png"/>
  <link rel="shortcut icon" href="/icons/favicon.ico"/>
  <link rel="stylesheet" href="/pwa.css"/>
  <link rel="stylesheet" href="/css/email-verified.css"/>
</head>
<body>
  <main class="card" role="main">
    <div class="icon-wrap" aria-hidden="true">
      <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle class="check-circle" cx="24" cy="24" r="20" stroke-opacity=".25"/>
        <polyline class="check-mark" points="14,25 21,32 34,17"/>
      </svg>
    </div>
    <div class="badge">Verification Complete</div>
    <h1>Email Verified Successfully!</h1>
    <p class="desc">Your account has been verified successfully. You can now login to your account and start shopping.</p>
    <div class="progress-track" role="progressbar" aria-label="Redirect countdown">
      <div class="progress-fill"></div>
    </div>
    <a href="/login.html" class="btn-primary" id="login-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
        <polyline points="10 17 15 12 10 7"/>
        <line x1="15" y1="12" x2="3" y2="12"/>
      </svg>
      Login to Your Account
    </a>
    <a href="/" class="btn-secondary">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Go to Homepage
    </a>
    <div class="countdown-wrap" aria-live="polite">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
      Redirecting to login in <span id="countdown-num">5</span> seconds…
    </div>
  </main>
  <footer>© 2024 <span>Rinku Kirana Store</span> · All rights reserved</footer>
  <script>
    (function(){
      const el=document.getElementById('countdown-num');
      let count=5;
      const tick=setInterval(function(){
        count--;
        el.style.animation='none';
        void el.offsetWidth;
        el.style.animation='countShrink .35s ease';
        el.textContent=count;
        if(count<=0){clearInterval(tick);window.location.href='/login.html';}
      },1000);
    })();
  </script>
  <script src="/pwa.js?v=1"></script>
</body>
</html>
