<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Verified – Rinku Kirana Store</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:       #16a34a;
      --green-dark:  #15803d;
      --green-light: #dcfce7;
      --green-ring:  #bbf7d0;
      --text-dark:   #1f2937;
      --text-mid:    #4b5563;
      --text-soft:   #9ca3af;
      --bg:          #f8fafc;
      --white:       #ffffff;
      --shadow:      0 20px 60px rgba(22, 163, 74, 0.10), 0 4px 16px rgba(0,0,0,0.07);
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f0fdf4 0%, #f8fafc 45%, #eff6ff 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: var(--text-dark);
      padding: 24px 16px;
    }

    /* ── fade-in ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0);    }
    }
    @keyframes popIn {
      0%   { transform: scale(0.4); opacity: 0; }
      70%  { transform: scale(1.08); }
      100% { transform: scale(1);   opacity: 1; }
    }
    @keyframes drawCheck {
      from { stroke-dashoffset: 60; }
      to   { stroke-dashoffset: 0;  }
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0   rgba(22,163,74,.35); }
      50%       { box-shadow: 0 0 0 14px rgba(22,163,74,.0);  }
    }
    @keyframes countShrink {
      from { transform: scale(1.2); opacity: .6; }
      to   { transform: scale(1);   opacity: 1;  }
    }

    .card {
      background: var(--white);
      border-radius: 20px;
      box-shadow: var(--shadow);
      max-width: 460px;
      width: 100%;
      padding: 52px 40px 44px;
      text-align: center;
      animation: fadeUp .55s cubic-bezier(.22,.68,0,1.2) both;
    }

    /* ── icon ── */
    .icon-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: var(--green-light);
      margin-bottom: 28px;
      animation: popIn .5s .2s cubic-bezier(.22,.68,0,1.2) both, pulse 2.4s 1s ease-in-out infinite;
    }
    .icon-wrap svg {
      width: 44px;
      height: 44px;
    }
    .check-circle {
      fill: none;
      stroke: var(--green);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .check-mark {
      fill: none;
      stroke: var(--green);
      stroke-width: 3.2;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 60;
      stroke-dashoffset: 60;
      animation: drawCheck .45s .55s ease forwards;
    }

    /* ── badge ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--green-light);
      color: var(--green-dark);
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 999px;
      border: 1px solid var(--green-ring);
      margin-bottom: 20px;
    }
    .badge::before {
      content: '';
      display: block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--text-dark);
      line-height: 1.25;
      margin-bottom: 14px;
      letter-spacing: -.02em;
    }

    .desc {
      font-size: .97rem;
      color: var(--text-mid);
      line-height: 1.65;
      max-width: 340px;
      margin: 0 auto 32px;
    }

    /* ── buttons ── */
    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px 24px;
      border-radius: 12px;
      border: none;
      background: var(--green);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: background .18s, transform .15s, box-shadow .18s;
      box-shadow: 0 4px 14px rgba(22,163,74,.35);
      margin-bottom: 12px;
    }
    .btn-primary:hover {
      background: var(--green-dark);
      transform: translateY(-2px);
      box-shadow: 0 8px 22px rgba(22,163,74,.4);
    }
    .btn-primary:active { transform: translateY(0); }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      width: 100%;
      padding: 13px 24px;
      border-radius: 12px;
      border: 1.5px solid #e5e7eb;
      background: transparent;
      color: var(--text-mid);
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background .18s, border-color .18s, color .18s, transform .15s;
      margin-bottom: 28px;
    }
    .btn-secondary:hover {
      background: #f9fafb;
      border-color: #d1d5db;
      color: var(--text-dark);
      transform: translateY(-1px);
    }

    /* ── countdown ── */
    .countdown-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: .85rem;
      color: var(--text-soft);
    }
    .countdown-wrap svg { flex-shrink: 0; }
    #countdown-num {
      font-variant-numeric: tabular-nums;
      font-weight: 700;
      color: var(--green);
      display: inline-block;
      animation: countShrink .35s ease;
    }

    /* ── progress bar ── */
    .progress-track {
      width: 100%;
      height: 4px;
      background: #f1f5f9;
      border-radius: 999px;
      margin: 18px 0 24px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, var(--green-light), var(--green));
      border-radius: 999px;
      transform-origin: left;
      animation: drain 5s linear forwards;
    }
    @keyframes drain {
      from { transform: scaleX(1); }
      to   { transform: scaleX(0); }
    }

    /* ── footer ── */
    footer {
      margin-top: 32px;
      font-size: .78rem;
      color: var(--text-soft);
      letter-spacing: .03em;
    }
    footer span {
      font-weight: 700;
      color: var(--green);
    }

    /* ── responsive ── */
    @media (max-width: 480px) {
      .card { padding: 40px 24px 36px; }
      h1 { font-size: 1.35rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; }
    }
  </style>
</head>
<body>

  <main class="card" role="main">

    <!-- Icon -->
    <div class="icon-wrap" aria-hidden="true">
      <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle class="check-circle" cx="24" cy="24" r="20" stroke-opacity=".25"/>
        <polyline class="check-mark" points="14,25 21,32 34,17"/>
      </svg>
    </div>

    <!-- Badge -->
    <div class="badge">Verification Complete</div>

    <!-- Heading -->
    <h1>Email Verified Successfully!</h1>

    <!-- Description -->
    <p class="desc">
      Your account has been verified successfully. You can now login to your account and start shopping.
    </p>

    <!-- Progress bar -->
    <div class="progress-track" role="progressbar" aria-label="Redirect countdown">
      <div class="progress-fill"></div>
    </div>

    <!-- CTA buttons -->
    <a href="/login.html" class="btn-primary" id="login-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
        <polyline points="10 17 15 12 10 7"/>
        <line x1="15" y1="12" x2="3" y2="12"/>
      </svg>
      Login to Your Account
    </a>

    <a href="/" class="btn-secondary">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Go to Homepage
    </a>

    <!-- Countdown -->
    <div class="countdown-wrap" aria-live="polite">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12 6 12 12 16 14"/>
      </svg>
      Redirecting to login in <span id="countdown-num">5</span> seconds…
    </div>

  </main>

  <footer>© 2024 <span>Rinku Kirana Store</span> · All rights reserved</footer>

  <script>
    (function () {
      const el = document.getElementById('countdown-num');
      let count = 5;

      const tick = setInterval(function () {
        count--;
        // Re-trigger animation
        el.style.animation = 'none';
        void el.offsetWidth; // reflow
        el.style.animation = 'countShrink .35s ease';
        el.textContent = count;

        if (count <= 0) {
          clearInterval(tick);
          window.location.href = '/login.html';
        }
      }, 1000);
    })();
  </script>

</body>
</html>
