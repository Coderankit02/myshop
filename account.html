<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>My Account – Rinku Kirana</title>
<link rel="manifest" href="/manifest.json"/>
<meta name="theme-color" content="#15803D"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Rinku Kirana"/>
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png"/>
<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png"/>
<link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png"/>
<link rel="shortcut icon" href="/icons/favicon.ico"/>
<link rel="stylesheet" href="/pwa.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --g1:#1BA672;--g2:#0D9488;--g3:#059669;
  --primary:#1BA672;--primary-dark:#158A5E;--primary-light:#E8F8F1;
  --orange:#FF6B35;--yellow:#FFB800;--red:#E53E3E;--blue:#3B82F6;--purple:#8B5CF6;
  --dark:#0F172A;--text:#1E293B;--gray:#64748B;--muted:#94A3B8;--light:#F8FAFC;
  --border:#E2E8F0;--white:#fff;
  --radius-sm:8px;--radius:12px;--radius-lg:16px;--radius-xl:20px;--radius-2xl:24px;
  --shadow-xs:0 1px 2px rgba(0,0,0,0.05);
  --shadow-sm:0 1px 4px rgba(0,0,0,0.07),0 2px 8px rgba(0,0,0,0.04);
  --shadow-md:0 4px 16px rgba(0,0,0,0.08),0 1px 4px rgba(0,0,0,0.05);
  --shadow-lg:0 8px 32px rgba(0,0,0,0.10),0 2px 8px rgba(0,0,0,0.06);
  --shadow-green:0 4px 20px rgba(27,166,114,0.25);
}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth;}
body{font-family:'Inter',system-ui,sans-serif;background:#F0F4F8;color:var(--text);min-height:100vh;overflow-x:hidden;}
button{cursor:pointer;border:none;outline:none;font-family:inherit;}
input,select,textarea{outline:none;font-family:inherit;font-size:16px;}
a{text-decoration:none;color:inherit;}
.topnav{
  background:rgba(255,255,255,0.95);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(226,232,240,0.8);
  position:sticky;top:0;z-index:200;
  padding:0 16px;height:58px;
  display:flex;align-items:center;justify-content:space-between;
}
.topnav-left{display:flex;align-items:center;gap:10px;}
.back-btn{
  width:38px;height:38px;border-radius:var(--radius);
  background:var(--light);border:1.5px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;color:var(--gray);transition:all .2s;
}
.back-btn:hover{background:var(--primary-light);border-color:var(--primary);color:var(--primary);}
.topnav-title{font-size:.95rem;font-weight:800;color:var(--dark);letter-spacing:-.3px;}
.logo-link{font-size:1.15rem;font-weight:900;color:var(--primary);}
.logo-link span{color:var(--orange);}
.tabs-bar{
  background:#fff;
  border-bottom:1px solid var(--border);
  display:flex;overflow-x:auto;scrollbar-width:none;
  padding:0 12px;gap:2px;
  position:sticky;top:58px;z-index:150;
}
.tabs-bar::-webkit-scrollbar{display:none;}
.tab-btn{
  flex-shrink:0;padding:14px 14px 12px;
  font-size:.73rem;font-weight:700;color:var(--muted);
  border-bottom:2px solid transparent;
  display:flex;align-items:center;gap:5px;
  white-space:nowrap;cursor:pointer;transition:all .2s;
  background:none;border-radius:0;
}
.tab-btn:hover{color:var(--gray);}
.tab-btn.on{color:var(--primary);border-bottom-color:var(--primary);}
.tab-btn .tb-icon{font-size:.95rem;}
.page{max-width:960px;margin:0 auto;padding:16px 16px 100px;}
@media(min-width:768px){
  .page{padding:24px 28px 60px;}
}
@media(min-width:960px){
  .page{display:grid;grid-template-columns:280px 1fr;gap:20px;align-items:start;}
  .col-sticky{position:sticky;top:110px;}
}
.card{background:#fff;border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);border:1px solid rgba(226,232,240,.6);overflow:hidden;margin-bottom:14px;}
.card-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 18px 14px;
  border-bottom:1px solid #F1F5F9;
}
.card-title{display:flex;align-items:center;gap:8px;font-size:.88rem;font-weight:800;color:var(--dark);}
.card-title-icon{font-size:1rem;}
.card-action-btn{
  font-size:.72rem;font-weight:700;color:var(--primary);
  background:var(--primary-light);padding:5px 12px;
  border-radius:50px;border:none;cursor:pointer;transition:all .2s;
}
.card-action-btn:hover{background:var(--primary);color:#fff;}
.card-body{padding:16px 18px;}
.hero-card{
  background:linear-gradient(135deg,#064E3B 0%,#065F46 35%,#1BA672 80%,#34D399 100%);
  border-radius:var(--radius-xl);padding:22px;margin-bottom:14px;
  position:relative;overflow:hidden;
  box-shadow:0 8px 32px rgba(6,78,59,0.35);
}
.hero-bg-circle1{
  position:absolute;right:-50px;top:-50px;
  width:200px;height:200px;border-radius:50%;
  background:rgba(255,255,255,0.06);
}
.hero-bg-circle2{
  position:absolute;right:40px;bottom:-70px;
  width:240px;height:240px;border-radius:50%;
  background:rgba(255,255,255,0.04);
}
.hero-bg-dots{
  position:absolute;left:0;top:0;right:0;bottom:0;
  background-image:radial-gradient(rgba(255,255,255,0.08) 1px,transparent 1px);
  background-size:18px 18px;
}
.hero-top{display:flex;align-items:center;gap:14px;margin-bottom:20px;position:relative;z-index:1;}
.avatar-wrap{position:relative;flex-shrink:0;}
.avatar{
  width:72px;height:72px;border-radius:50%;
  background:rgba(255,255,255,0.2);
  border:3px solid rgba(255,255,255,0.5);
  display:flex;align-items:center;justify-content:center;
  font-size:2.2rem;overflow:hidden;
  box-shadow:0 4px 16px rgba(0,0,0,0.2);
}
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.avatar-edit-btn{
  position:absolute;bottom:1px;right:1px;
  width:24px;height:24px;
  background:var(--yellow);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:.65rem;cursor:pointer;
  border:2px solid rgba(255,255,255,0.9);
  box-shadow:0 2px 6px rgba(0,0,0,0.15);
  transition:transform .2s;
}
.avatar-edit-btn:hover{transform:scale(1.1);}
.hero-info{flex:1;min-width:0;}
.hero-greeting{font-size:.68rem;color:rgba(255,255,255,0.65);font-weight:600;letter-spacing:.8px;text-transform:uppercase;margin-bottom:2px;}
.hero-name{font-size:1.35rem;font-weight:900;color:#fff;letter-spacing:-.4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.hero-email{font-size:.73rem;color:rgba(255,255,255,0.7);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.loyalty-pill{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(255,184,0,0.22);
  border:1.5px solid rgba(255,184,0,0.45);
  border-radius:50px;padding:4px 12px;margin-top:8px;
}
.loyalty-pill span{font-size:.7rem;font-weight:800;color:#FFD700;}
.hero-stats{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:8px;position:relative;z-index:1;
}
.hstat{
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:var(--radius);padding:11px 10px;text-align:center;
  backdrop-filter:blur(8px);
}
.hstat-val{font-size:1.05rem;font-weight:900;color:#fff;letter-spacing:-.5px;}
.hstat-lbl{font-size:.6rem;color:rgba(255,255,255,0.65);font-weight:600;margin-top:2px;letter-spacing:.3px;}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:14px;}
@media(min-width:480px){.stats-grid{grid-template-columns:repeat(6,1fr);}}
.stat-tile{
  background:#fff;border-radius:var(--radius);
  padding:13px 8px;text-align:center;
  box-shadow:var(--shadow-xs);
  border:1.5px solid var(--border);
  cursor:pointer;transition:all .2s;
}
.stat-tile:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);border-color:var(--primary);}
.stat-tile-icon{font-size:1.35rem;margin-bottom:5px;}
.stat-tile-val{font-size:1rem;font-weight:900;color:var(--dark);letter-spacing:-.5px;}
.stat-tile-lbl{font-size:.58rem;font-weight:700;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.4px;}
.order-row{
  display:flex;gap:12px;align-items:flex-start;
  padding:14px 18px;border-bottom:1px solid #F8FAFC;
  transition:background .15s;cursor:pointer;
}
.order-row:last-child{border-bottom:none;}
.order-row:hover{background:#FAFBFC;}
.order-icon-box{
  width:46px;height:46px;border-radius:var(--radius);
  background:var(--light);display:flex;align-items:center;
  justify-content:center;font-size:1.4rem;flex-shrink:0;
  border:1.5px solid var(--border);
}
.order-info{flex:1;min-width:0;}
.order-num{font-size:.82rem;font-weight:800;color:var(--dark);}
.order-meta{font-size:.7rem;color:var(--muted);margin-top:2px;}
.order-date{font-size:.66rem;color:var(--muted);margin-top:3px;}
.order-right{text-align:right;flex-shrink:0;}
.order-amt{font-size:.92rem;font-weight:800;color:var(--dark);}
.badge{display:inline-block;padding:3px 10px;border-radius:50px;font-size:.6rem;font-weight:800;margin-top:4px;letter-spacing:.3px;}
.badge-pending{background:#FEF9C3;color:#854D0E;}
.badge-confirmed{background:#DBEAFE;color:#1D4ED8;}
.badge-out_for_delivery{background:#F3E8FF;color:#7C3AED;}
.badge-delivered{background:#DCFCE7;color:#166534;}
.badge-cancelled{background:#FEE2E2;color:#DC2626;}
.reorder-btn{
  margin-top:6px;background:var(--primary-light);color:var(--primary);
  border-radius:var(--radius-sm);padding:5px 11px;
  font-size:.66rem;font-weight:700;cursor:pointer;border:none;
  transition:all .2s;
}
.reorder-btn:hover{background:var(--primary);color:#fff;}
.addr-row{
  display:flex;gap:12px;align-items:flex-start;
  padding:14px 18px;border-bottom:1px solid #F8FAFC;
}
.addr-row:last-child{border-bottom:none;}
.addr-icon-box{
  width:42px;height:42px;border-radius:var(--radius);
  background:var(--primary-light);display:flex;
  align-items:center;justify-content:center;
  font-size:1.1rem;flex-shrink:0;
}
.addr-info{flex:1;min-width:0;}
.addr-label-row{display:flex;align-items:center;gap:6px;margin-bottom:3px;}
.addr-label{font-size:.82rem;font-weight:800;color:var(--dark);}
.default-tag{
  background:var(--primary);color:#fff;
  font-size:.52rem;padding:2px 7px;border-radius:50px;font-weight:800;
}
.addr-text{font-size:.72rem;color:var(--gray);line-height:1.5;}
.addr-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
.addr-btn{font-size:.66rem;font-weight:700;padding:4px 10px;border-radius:6px;border:none;cursor:pointer;transition:all .2s;}
.addr-btn-edit{background:#EFF6FF;color:#1D4ED8;}
.addr-btn-edit:hover{background:#DBEAFE;}
.addr-btn-del{background:#FEF2F2;color:var(--red);}
.addr-btn-del:hover{background:#FEE2E2;}
.addr-btn-default{background:var(--primary-light);color:var(--primary);}
.addr-btn-default:hover{background:var(--primary);color:#fff;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.field-group{margin-bottom:12px;}
.field-label{font-size:.7rem;font-weight:700;color:var(--gray);margin-bottom:5px;display:block;letter-spacing:.3px;text-transform:uppercase;}
.inp{
  width:100%;background:var(--light);
  border:1.5px solid var(--border);border-radius:var(--radius);
  padding:11px 13px;font-size:15px;color:var(--dark);
  transition:all .2s;
}
.inp:focus{border-color:var(--primary);background:#fff;box-shadow:0 0 0 3px rgba(27,166,114,0.08);}
.inp:read-only{background:#F1F5F9;color:var(--gray);cursor:not-allowed;}
textarea.inp{resize:none;}
.btn-primary{
  width:100%;padding:13px;
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  color:#fff;border-radius:var(--radius);
  font-weight:800;font-size:.88rem;border:none;cursor:pointer;
  box-shadow:var(--shadow-green);transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(27,166,114,0.35);}
.btn-primary:active{transform:translateY(0);}
.btn-secondary{
  width:100%;padding:12px;
  background:var(--light);color:var(--gray);
  border-radius:var(--radius);font-weight:700;
  font-size:.88rem;border:1.5px solid var(--border);cursor:pointer;transition:all .2s;
}
.btn-secondary:hover{border-color:var(--gray);}
.btn-danger{
  width:100%;padding:13px;
  background:#FEF2F2;color:var(--red);
  border-radius:var(--radius);font-weight:800;
  font-size:.88rem;border:1.5px solid #FECACA;cursor:pointer;transition:all .2s;
}
.btn-danger:hover{background:#FEE2E2;}
.toggle-wrap{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.toggle{width:46px;height:26px;background:#CBD5E1;border-radius:13px;position:relative;cursor:pointer;transition:background .3s;flex-shrink:0;}
.toggle.on{background:var(--primary);}
.toggle-dot{width:20px;height:20px;background:#fff;border-radius:50%;position:absolute;top:3px;left:3px;transition:left .3s;box-shadow:0 1px 4px rgba(0,0,0,0.2);}
.toggle.on .toggle-dot{left:23px;}
.toggle-label{font-size:.82rem;font-weight:600;color:var(--text);}
.wish-row{
  display:flex;gap:12px;align-items:center;
  padding:13px 18px;border-bottom:1px solid #F8FAFC;
  transition:background .15s;
}
.wish-row:last-child{border-bottom:none;}
.wish-emoji-box{
  width:50px;height:50px;border-radius:var(--radius);
  background:var(--light);display:flex;align-items:center;
  justify-content:center;font-size:1.7rem;flex-shrink:0;
  border:1.5px solid var(--border);
}
.wish-info{flex:1;min-width:0;}
.wish-name{font-size:.82rem;font-weight:700;color:var(--dark);}
.wish-unit{font-size:.68rem;color:var(--muted);margin-top:1px;}
.wish-price{font-size:.9rem;font-weight:800;color:var(--primary);margin-top:3px;}
.wish-actions{display:flex;flex-direction:column;gap:5px;}
.wish-add-btn{background:var(--primary);color:#fff;border-radius:var(--radius-sm);padding:6px 13px;font-size:.7rem;font-weight:700;border:none;cursor:pointer;transition:all .2s;}
.wish-add-btn:hover{background:var(--primary-dark);}
.wish-del-btn{background:#FEF2F2;color:var(--red);border-radius:var(--radius-sm);padding:5px 11px;font-size:.65rem;font-weight:700;border:none;cursor:pointer;}
.notif-row{
  display:flex;gap:12px;align-items:flex-start;
  padding:13px 18px;border-bottom:1px solid #F8FAFC;
  cursor:pointer;transition:background .15s;
}
.notif-row:last-child{border-bottom:none;}
.notif-row.unread{background:#F0FDF9;}
.notif-row:hover{background:#F8FAFC;}
.notif-icon-box{
  width:40px;height:40px;border-radius:var(--radius);
  display:flex;align-items:center;justify-content:center;
  font-size:1.05rem;flex-shrink:0;
}
.notif-body{flex:1;min-width:0;}
.notif-title{font-size:.8rem;font-weight:700;color:var(--dark);}
.notif-msg{font-size:.71rem;color:var(--gray);margin-top:2px;line-height:1.45;}
.notif-time{font-size:.63rem;color:var(--muted);margin-top:4px;}
.unread-dot{width:8px;height:8px;background:var(--primary);border-radius:50%;margin-top:6px;flex-shrink:0;}
.read-dot{width:8px;height:8px;border-radius:50%;margin-top:6px;flex-shrink:0;}
.rewards-hero{
  background:linear-gradient(135deg,#1E1B4B,#312E81,#4F46E5);
  border-radius:var(--radius-lg);padding:20px;
  margin-bottom:14px;position:relative;overflow:hidden;
  box-shadow:0 8px 32px rgba(79,70,229,0.3);
}
.rewards-hero::before{content:'⭐';position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:90px;opacity:.08;}
.rw-pts{font-size:2.4rem;font-weight:900;color:#fff;letter-spacing:-1px;}
.rw-pts-lbl{font-size:.7rem;color:rgba(255,255,255,0.65);font-weight:600;margin-top:2px;}
.rw-bar-bg{background:rgba(255,255,255,0.15);border-radius:50px;height:7px;margin-top:16px;}
.rw-bar{background:linear-gradient(90deg,#FFB800,#FF6B35);height:7px;border-radius:50px;transition:width 1.2s cubic-bezier(0.4,0,0.2,1);}
.rw-bar-labels{display:flex;justify-content:space-between;font-size:.63rem;color:rgba(255,255,255,0.6);margin-top:5px;}
.rw-chips{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;}
.rw-chip{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.15);border-radius:var(--radius);padding:10px 14px;flex:1;min-width:72px;}
.rw-chip-val{font-size:.92rem;font-weight:900;color:#fff;}
.rw-chip-lbl{font-size:.6rem;color:rgba(255,255,255,0.65);margin-top:2px;}
.referral-box{
  background:linear-gradient(135deg,#FFF7ED,#FED7AA);
  border-radius:var(--radius-lg);padding:16px 18px;
  border:1.5px solid #FDBA74;margin-bottom:14px;
}
.ref-code-box{
  background:#fff;border-radius:var(--radius);
  padding:11px 14px;display:flex;align-items:center;
  justify-content:space-between;margin:12px 0;
  border:1.5px dashed #FB923C;
}
.ref-code{font-size:1.1rem;font-weight:900;color:var(--dark);letter-spacing:3px;}
.ref-copy-btn{
  background:var(--orange);color:#fff;
  border-radius:var(--radius-sm);padding:6px 13px;
  font-size:.7rem;font-weight:700;border:none;cursor:pointer;
  transition:all .2s;
}
.ref-copy-btn:hover{background:#E85D2F;}
.ref-share-btn{
  width:100%;background:linear-gradient(135deg,#EA580C,#DC2626);
  color:#fff;border-radius:var(--radius);padding:12px;
  font-weight:800;font-size:.85rem;border:none;cursor:pointer;
  transition:all .2s;
}
.ref-share-btn:hover{opacity:.9;}
.how-row{
  display:flex;gap:12px;align-items:center;
  padding:11px 0;border-bottom:1px solid #F8FAFC;
}
.how-row:last-child{border-bottom:none;}
.how-icon{width:42px;height:42px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;}
.how-title{font-size:.8rem;font-weight:700;color:var(--dark);}
.how-sub{font-size:.68rem;color:var(--muted);margin-top:2px;}
.avatar-upload-row{
  display:flex;align-items:center;gap:14px;
  background:var(--light);border-radius:var(--radius-lg);
  padding:16px;margin-bottom:16px;cursor:pointer;
  border:1.5px solid var(--border);transition:border-color .2s;
}
.avatar-upload-row:hover{border-color:var(--primary);}
.avatar-big{
  width:64px;height:64px;border-radius:50%;
  background:var(--primary-light);border:3px solid var(--primary);
  display:flex;align-items:center;justify-content:center;
  font-size:2rem;overflow:hidden;flex-shrink:0;
}
.avatar-big img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.avatar-upload-info-title{font-size:.82rem;font-weight:700;color:var(--dark);}
.avatar-upload-info-sub{font-size:.7rem;color:var(--muted);margin-top:2px;}
.settings-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;border-bottom:1px solid #F8FAFC;
  cursor:pointer;transition:background .15s;
}
.settings-row:last-child{border-bottom:none;}
.settings-row:hover{background:#FAFBFC;}
.settings-left{display:flex;align-items:center;gap:12px;}
.settings-icon{width:38px;height:38px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
.settings-label{font-size:.84rem;font-weight:700;color:var(--dark);}
.settings-sub{font-size:.68rem;color:var(--muted);margin-top:1px;}
.settings-arrow{color:var(--muted);font-size:.9rem;}
.payment-row{
  display:flex;align-items:center;gap:12px;
  padding:13px 18px;border-bottom:1px solid #F8FAFC;

.skeleton{
  background:linear-gradient(90deg,#F1F5F9 25%,#E2E8F0 50%,#F1F5F9 75%);

@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.toast{

@media(min-width:768px){.toast{bottom:24px;}}
.bottom-nav{

</style>
</head>
<body>

</nav>

<div id="modalWrap"></div>

<!-- JS MODULES -->
<script src="/js/cart.js"></script>
<script src="/js/profile.js"></script>
<script src="/js/orders.js"></script>

<script>
/* ═══════════════════════════════════════════
   SUPABASE + STATE
═══════════════════════════════════════════ */
const SUPABASE_URL  = 'https://pffaflasgwhydkmxwkky.supabase.co';
const SUPABASE_ANON = 'sb_publishable__tFDYhkM3blZ0pIVT0YxLA_YvkKq79L';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
window.sb = sb; // expose the real client so cart.js / profile.js / orders.js can use it via getDB()

const VALID_TABS = ['overview','orders','addresses','profile','wishlist','notifications','rewards','settings'];
const urlTab = new URLSearchParams(window.location.search).get('tab');

const STATE = {
  user: null, profile: null,
  orders: [], addresses: [], wishlist: [], notifications: [],
  activeTab: VALID_TABS.includes(urlTab) ? urlTab : 'overview', cartCount: 0,
};

/* ═══════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════ */
const $  = id => document.getElementById(id);
const qs = sel => document.querySelector(sel);

function showToast(msg, dur = 2600) {
  const t = $('toastEl');
  t.textContent = msg; t.style.display = 'block';
  clearTimeout(t._t);
  t._t = setTimeout(() => t.style.display = 'none', dur);
}

function fmt(n) { return '₹' + Number(n).toLocaleString('en-IN'); }
function fmtDate(d) {
  return new Date(d).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
}
function fmtTime(d) {
  return new Date(d).toLocaleString('en-IN', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
}
function memberSince(d) {
  const dt = new Date(d);
  return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][dt.getMonth()] + ' ' + dt.getFullYear();
}
function loyaltyLevel(n) {
  if (n >= 50) return { label: '🥇 Gold Member', color: '#F59E0B' };
  if (n >= 20) return { label: '🥈 Silver Member', color: '#94A3B8' };
  if (n >= 5)  return { label: '🥉 Bronze Member', color: '#B45309' };
  return { label: '🌱 New Member', color: '#10B981' };
}
function statusLabel(s) {
  return { pending:'Pending', confirmed:'Confirmed', out_for_delivery:'Out for Delivery', delivered:'Delivered', cancelled:'Cancelled' }[s] || s;
}
function notifColor(type) {
  return { offer:'#FFF7ED', order:'#EFF6FF', delivery:'#F5F3FF', stock:'#F0FDF4', system:'#F8FAFC' }[type] || '#F8FAFC';
}
function notifIcon(type) {
  return { offer:'🎁', order:'📦', delivery:'🚴', stock:'📢', system:'ℹ️' }[type] || '🔔';
}
function addrIcon(label) {
  const l = (label || '').toLowerCase();
  if (l.includes('home')) return '🏠';
  if (l.includes('office') || l.includes('work')) return '🏢';
  return '📍';
}
function animCount(el, target, dur = 900) {
  if (!el) return;
  let v = 0, step = target / (dur / 16);
  const tick = () => { v += step; if (v >= target) { el.textContent = Math.round(target); return; } el.textContent = Math.round(v); requestAnimationFrame(tick); };
  tick();
}

/* ═══════════════════════════════════════════
   DATA LOADERS
═══════════════════════════════════════════ */
async function boot() {
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (!session?.user) { window.location.href = 'login.html'; return; }
    STATE.user = session.user;

    const results = await Promise.allSettled([
      loadProfile(), loadOrders(), loadAddresses(), loadWishlist(), loadNotifs()
    ]);

    const [profileR, ordersR, addrR, wishR, notifR] = results;
    STATE.profile       = profileR.status === 'fulfilled' ? profileR.value : fallbackProfile();
    STATE.orders        = ordersR.status === 'fulfilled' ? ordersR.value : [];
    STATE.addresses     = addrR.status === 'fulfilled' ? addrR.value : [];
    STATE.wishlist      = wishR.status === 'fulfilled' ? wishR.value : [];
    STATE.notifications = notifR.status === 'fulfilled' ? notifR.value : [];
    STATE.cartCount     = window.RKCart ? window.RKCart.getCount() : 0;

    results.forEach((r, i) => {
      if (r.status === 'rejected') console.error('[Account] loader', i, 'failed:', r.reason);
    });
  } catch (err) {
    console.error('[Account] boot failed:', err);
    showToast('Kuch data load nahi ho paya, retry karo.');
  } finally {
    $('loadingPage').style.display = 'none';
    $('app').style.display = 'block';
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('on', b.dataset.tab === STATE.activeTab));
    renderTab(STATE.activeTab);
  }
}

function fallbackProfile() {
  const meta = STATE.user?.user_metadata || {};
  return {
    id: STATE.user?.id, name: meta.name || STATE.user?.email?.split('@')[0] || 'User',
    email: STATE.user?.email, phone: meta.phone || '', avatar_url: null,
    created_at: STATE.user?.created_at,
  };
}

async function loadProfile() {
  try {
    if (window.RKProfile?.loadProfile) {
      const p = await window.RKProfile.loadProfile(STATE.user.id);
      if (p) return p;
    }
  } catch (err) { console.error('[Account] RKProfile.loadProfile failed:', err); }
  try {
    const { data } = await sb.from('profiles').select('*').eq('id', STATE.user.id).single();
    if (data) return data;
  } catch (err) { console.error('[Account] direct profile fetch failed:', err); }
  return fallbackProfile();
}
async function loadOrders() {
  try {
    const { data } = await sb.from('orders').select('*').eq('user_id', STATE.user.id).order('created_at', { ascending: false }).limit(25);
    return data || [];
  } catch (err) { console.error('[Account] loadOrders failed:', err); return []; }
}
async function loadAddresses() {
  try {
    if (window.RKProfile?.loadAddresses) return await window.RKProfile.loadAddresses(STATE.user.id);
  } catch (err) { console.error('[Account] RKProfile.loadAddresses failed:', err); }
  try {
    const { data } = await sb.from('addresses').select('*').eq('user_id', STATE.user.id).order('is_default', { ascending: false });
    return data || [];
  } catch (err) { console.error('[Account] direct addresses fetch failed:', err); return []; }
}
async function loadWishlist() {
  try {
    const { data } = await sb.from('wishlist').select('*').eq('user_id', STATE.user.id).order('created_at', { ascending: false });
    return data || [];
  } catch (err) { console.error('[Account] loadWishlist failed:', err); return []; }
}
async function loadNotifs() {
  try {
    const { data } = await sb.from('notifications').select('*').eq('user_id', STATE.user.id).order('created_at', { ascending: false }).limit(30);
    return data || [];
  } catch (err) { console.error('[Account] loadNotifs failed:', err); return []; }
}

/* ═══════════════════════════════════════════
   TAB SYSTEM
═══════════════════════════════════════════ */
function setupTabs() {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  });
}

function switchTab(tab) {
  STATE.activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('on', b.dataset.tab === tab));
  renderTab(tab);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderTab(tab) {
  const wrap = $('pageWrap');
  wrap.innerHTML = '';
  ({ overview: renderOverview, orders: renderOrders, addresses: renderAddresses,
     profile: renderProfile, wishlist: renderWishlist, notifications: renderNotifications,
     rewards: renderRewards, settings: renderSettings })[tab]?.(wrap);
}

/* ═══════════════════════════════════════════
   OVERVIEW TAB
═══════════════════════════════════════════ */
function renderOverview(wrap) {
  const p = STATE.profile;
  const totalOrders  = STATE.orders.length;
  const delivered    = STATE.orders.filter(o => o.status === 'delivered').length;
  const totalSpend   = STATE.orders.filter(o => o.status === 'delivered').reduce((s, o) => s + (o.final_amount || 0), 0);
  const savings      = STATE.orders.reduce((s, o) => s + (o.discount || 0), 0);
  const unread       = STATE.notifications.filter(n => !n.is_read).length;
  const loyalty      = loyaltyLevel(totalOrders);

  wrap.innerHTML = `
  <!-- HERO CARD -->
  <div class="hero-card">
    <div class="hero-bg-circle1"></div>
    <div class="hero-bg-circle2"></div>
    <div class="hero-bg-dots"></div>
    <div class="hero-top">
      <div class="avatar-wrap">
        <div class="avatar" id="heroAv">
          ${p?.avatar_url ? `<img src="${p.avatar_url}" alt=""/>` : (p?.name ? p.name[0].toUpperCase() : '👤')}
        </div>
        <div class="avatar-edit-btn" onclick="switchTab('profile')" title="Edit Photo">✏️</div>
      </div>
      <div class="hero-info">
        <div class="hero-greeting">👋 Namaste,</div>
        <div class="hero-name">${p?.name || 'User'}</div>
        <div class="hero-email">${p?.email || ''}</div>
        <div class="loyalty-pill"><span style="color:${loyalty.color}">${loyalty.label}</span></div>
      </div>
    </div>
    <div class="hero-stats">
      <div class="hstat"><div class="hstat-val" id="hOrd">0</div><div class="hstat-lbl">Orders</div></div>
      <div class="hstat"><div class="hstat-val" id="hSav">₹0</div><div class="hstat-lbl">Saved</div></div>
      <div class="hstat"><div class="hstat-val">${memberSince(p?.created_at || STATE.user.created_at)}</div><div class="hstat-lbl">Member Since</div></div>
    </div>
  </div>

  <!-- QUICK STATS -->
  <div class="stats-grid">
    <div class="stat-tile" onclick="switchTab('orders')"><div class="stat-tile-icon">📦</div><div class="stat-tile-val" id="sc0">0</div><div class="stat-tile-lbl">Orders</div></div>
    <div class="stat-tile" onclick="switchTab('rewards')"><div class="stat-tile-icon">💰</div><div class="stat-tile-val" id="sc1">₹0</div><div class="stat-tile-lbl">Savings</div></div>
    <div class="stat-tile" onclick="switchTab('wishlist')"><div class="stat-tile-icon">❤️</div><div class="stat-tile-val" id="sc2">0</div><div class="stat-tile-lbl">Wishlist</div></div>
    <div class="stat-tile" onclick="switchTab('addresses')"><div class="stat-tile-icon">📍</div><div class="stat-tile-val" id="sc3">0</div><div class="stat-tile-lbl">Addresses</div></div>
    <div class="stat-tile" onclick="window.location.href='index.html'"><div class="stat-tile-icon">🛒</div><div class="stat-tile-val" id="sc4">0</div><div class="stat-tile-lbl">Cart</div></div>
    <div class="stat-tile" onclick="switchTab('notifications')"><div class="stat-tile-icon">🔔</div><div class="stat-tile-val" id="sc5">0</div><div class="stat-tile-lbl">Alerts</div></div>
  </div>

  <!-- RECENT ORDERS -->
  <div class="card">
    <div class="card-head">
      <div class="card-title"><span class="card-title-icon">📦</span> Recent Orders</div>
      <button class="card-action-btn" onclick="switchTab('orders')">View All</button>
    </div>
    <div class="divider"></div>
    ${STATE.orders.length
      ? STATE.orders.slice(0, 3).map(o => orderRowHTML(o)).join('')
      : `<div class="empty-state"><div class="empty-icon">🛒</div><div class="empty-title">Koi order nahi abhi tak</div><div class="empty-sub">Apna pehla order place karo!</div><button class="empty-cta" onclick="window.location.href='index.html'">Shop Now →</button></div>`
    }
  </div>

  <!-- QUICK ACTIONS -->
  <div class="card">
    <div class="card-head"><div class="card-title"><span class="card-title-icon">⚡</span> Quick Actions</div></div>
    <div class="divider"></div>
    <div class="qa-grid">
      ${[
        {i:'🛍️', t:'Shop Now',      s:'Browse products',    fn:"window.location.href='index.html'"},
        {i:'📍', t:'Add Address',   s:'Save delivery spot', fn:"switchTab('addresses')"},
        {i:'❤️', t:'My Wishlist',   s:'Saved products',     fn:"switchTab('wishlist')"},
        {i:'🎁', t:'Refer & Earn',  s:'Get ₹30 cashback',   fn:"switchTab('rewards')"},
      ].map(a => `
        <div class="qa-tile" onclick="${a.fn}">
          <div class="qa-icon">${a.i}</div>
          <div class="qa-title">${a.t}</div>
          <div class="qa-sub">${a.s}</div>
        </div>`).join('')}
    </div>
  </div>`;

  setTimeout(() => {
    animCount($('hOrd'), totalOrders);
    $('hSav').textContent = fmt(savings);
    animCount($('sc0'), totalOrders);
    $('sc1').textContent = fmt(savings);
    animCount($('sc2'), STATE.wishlist.length);
    animCount($('sc3'), STATE.addresses.length);
    animCount($('sc4'), STATE.cartCount);
    animCount($('sc5'), unread);
  }, 100);
}

/* ═══════════════════════════════════════════
   ORDERS TAB
═══════════════════════════════════════════ */
function orderRowHTML(o) {
  return `
  <div class="order-row" onclick="viewOrderDetail('${o.id}')">
    <div class="order-icon-box">🛒</div>
    <div class="order-info">
      <div class="order-num">${o.order_number}</div>
      <div class="order-meta">${o.delivery_name || ''} • ${o.delivery_city || 'Prayagraj'}</div>
      <div class="order-date">${fmtTime(o.created_at)}</div>

function previewAvatar(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => { $('profAvPreview').innerHTML = `<img src="${e.target.result}" alt=""/>`; };
  reader.readAsDataURL(file);
}

async function saveProfile() {
  const name  = $('pf_name').value.trim();
  const phone = $('pf_phone').value.trim();
  if (!name) { showToast('Naam zaroori hai!'); return; }

  const saveBtn = document.getElementById('profileSaveBtn');
  if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = '⏳ Saving...'; }

  let avatar_url = STATE.profile?.avatar_url || null;
  const avatarFile = $('avatarInput').files[0];

  if (avatarFile) {
    try {
      const ext  = avatarFile.name.split('.').pop();
      const path = `avatars/${STATE.user.id}.${ext}`;
      const { error: upErr } = await sb.storage.from('avatars').upload(path, avatarFile, { upsert: true });
      if (upErr) {
        console.error('[Account] avatar upload failed:', upErr);
        showToast('⚠️ Photo upload fail: ' + upErr.message);
      } else {
        const { data: urlData } = sb.storage.from('avatars').getPublicUrl(path);
        avatar_url = urlData.publicUrl + '?t=' + Date.now(); // cache-bust so the new photo shows right away
      }
    } catch (err) {
      console.error('[Account] avatar upload exception:', err);
      showToast('⚠️ Photo upload error: ' + (err.message || err));
    }
  }

  let updated = null;
  try {
    if (window.RKProfile) updated = await window.RKProfile.updateProfile(STATE.user.id, { name, phone, avatar_url });
    if (!updated) {
      const { data, error } = await sb.from('profiles').upsert({ id: STATE.user.id, name, phone, avatar_url, email: STATE.user.email, updated_at: new Date().toISOString() }).select().single();
      if (error) { console.error('[Account] profile save failed:', error); showToast('⚠️ Profile save error: ' + error.message); }
      else updated = data;
    }
  } catch (err) {
    console.error('[Account] saveProfile exception:', err);
    showToast('⚠️ Error: ' + (err.message || err));
  }

  if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = '💾 Profile Save Karo'; }

  if (updated) {
    STATE.profile = updated;
    renderProfile($('pageWrap')); // re-render from what's actually saved, not just the local file preview
    showToast('Profile update ho gaya! ✅');
  }
}

    { icon:'🔒', bg:'#EFF6FF', label:'Change Password',     sub:'Password update karo',        action:"window.location.href='forgot-password.html'" },
    { icon:'🔔', bg:'#FFF7ED', label:'Notifications',       sub:'Offers aur updates manage karo', action:"switchTab('notifications')" },
    { icon:'👤', bg:'#F0FDF4', label:'Edit Profile',        sub:'Name, phone update karo',     action:"switchTab('profile')" },
    { icon:'📍', bg:'#F5F3FF', label:'Manage Addresses',    sub:'Delivery addresses',           action:"switchTab('addresses')" },
    { icon:'⭐', bg:'#FFFBEB', label:'Rewards & Referral',  sub:'Points aur cashback',          action:"switchTab('rewards')" },
    { icon:'📦', bg:'#F0FDF4', label:'Order History',       sub:'Purane orders dekhein',        action:"switchTab('orders')" },
    { icon:'📱', bg:'#F8FAFC', label:'App Version',         sub:'v1.0.0 • Rinku Kirana',        action:'' },
  ];

  wrap.innerHTML = `
  <div class="card">
    <div class="card-head"><div class="card-title"><span class="card-title-icon">⚙️</span> Settings</div></div>
    <div class="divider"></div>
    ${settingsRows.map(r => `
      <div class="settings-row" onclick="${r.action}">
        <div class="settings-left">
          <div class="settings-icon" style="background:${r.bg}">${r.icon}</div>
          <div>
            <div class="settings-label">${r.label}</div>
            <div class="settings-sub">${r.sub}</div>
          </div>
        </div>
        <div class="settings-arrow">›</div>
      </div>`).join('')}
  </div>

  <!-- PAYMENT METHODS -->
  <div class="card">
    <div class="card-head"><div class="card-title"><span class="card-title-icon">💳</span> Payment Methods</div></div>
    <div class="divider"></div>
    <div class="payment-row">
      <div class="payment-icon" style="background:#F0FDF4">💵</div>
      <div class="payment-info"><div class="payment-name">Cash on Delivery</div><div class="payment-sub">Ghar pe cash dena</div></div>
      <span class="active-badge">Active</span>
    </div>
    <div class="payment-row">
      <div class="payment-icon" style="background:#EFF6FF">📱</div>
      <div class="payment-info"><div class="payment-name">UPI / QR Code</div><div class="payment-sub">rinkukirana@upi</div></div>
      <span class="active-badge">Active</span>
    </div>
  </div>

  <!-- LOGOUT -->
  <div class="card">
    <div class="card-body">
      <button class="btn-danger" onclick="doLogout()">🚪 Logout</button>
    </div>
  </div>

  <div style="text-align:center;font-size:.68rem;color:var(--muted);padding:10px 0 20px;line-height:2;">
    🛒 Rinku Kirana Store • Prayagraj<br/>
    📞 6393196765 • v1.0.0
  </div>`;
}

async function doLogout() {
  if (!confirm('Logout karna chahte hain?')) return;
  await sb.auth.signOut();
  window.location.href = 'index.html';
}

function showModal(html) {
  $('modalWrap').innerHTML = `
    <div class="modal-overlay" onclick="closeModal()">
      <div class="modal-box" onclick="event.stopPropagation()">${html}</div>
    </div>`;
}
function closeModal() { $('modalWrap').innerHTML = ''; }

  window.RKCart.init().catch(err => console.error('[Account] RKCart.init failed:', err));
}
boot();
</script>
