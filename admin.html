<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Admin — Payment Verification | Rinku Kirana</title>
<meta name="theme-color" content="#15803D"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --primary:#1BA672;--primary-dark:#158A5E;--primary-light:#E8F8F1;
  --yellow:#FFB800;--red:#E63946;--green:#1BA672;
  --dark:#1A1A2E;--text:#2D3748;--gray:#718096;
  --border:#E2E8F0;
  --page-bg:#F0F4F2;
  --glass-bg:rgba(255,255,255,0.65);--glass-border:rgba(255,255,255,0.5);
  --card-bg:#fff;
}
html[data-theme="dark"]{
  --primary:#2ECC82;--primary-dark:#16A34A;--primary-light:#163828;
  --yellow:#FFCB47;--red:#FF6B6B;
  --dark:#F1F5F9;--text:#CBD5E1;--gray:#94A3B8;
  --border:#2D3B4E;
  --page-bg:#0B1117;
  --glass-bg:rgba(21,27,38,0.65);--glass-border:rgba(255,255,255,0.08);
  --card-bg:#151B26;
}
body{
  font-family:'Inter',sans-serif;background:var(--page-bg);color:var(--text);
  min-height:100vh;transition:background-color .3s,color .3s;
}
body::before{
  content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:radial-gradient(circle at 15% 0%, rgba(27,166,114,0.12), transparent 45%),
             radial-gradient(circle at 85% 100%, rgba(255,184,0,0.10), transparent 45%);
}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
button{cursor:pointer;border:none;font-family:'Inter',sans-serif;}
input,textarea{outline:none;border:none;font-family:'Inter',sans-serif;font-size:15px;background:transparent;color:var(--text);}

.glass{
  background:var(--glass-bg);
  border:1px solid var(--glass-border);
  backdrop-filter:blur(16px) saturate(160%);
  -webkit-backdrop-filter:blur(16px) saturate(160%);
}

/* ══════════════════ LOGIN SCREEN ══════════════════ */
#login-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
}
.login-card{
  width:100%;max-width:380px;border-radius:24px;padding:36px 28px;
  box-shadow:0 20px 60px rgba(0,0,0,0.12);
  animation:floatIn .5s cubic-bezier(.25,.46,.45,.94);
}
@keyframes floatIn{from{opacity:0;transform:translateY(16px) scale(.97);}to{opacity:1;transform:translateY(0) scale(1);}}
.login-logo{
  width:60px;height:60px;border-radius:18px;margin:0 auto 16px;
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  display:flex;align-items:center;justify-content:center;font-size:28px;
  box-shadow:0 8px 24px rgba(27,166,114,0.35);
}
.login-title{font-size:1.25rem;font-weight:800;text-align:center;color:var(--dark);}
.login-sub{font-size:.8rem;color:var(--gray);text-align:center;margin-top:4px;margin-bottom:24px;}
.field-group{margin-bottom:14px;}
.field-label{font-size:.72rem;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:block;}
.field-input{
  width:100%;padding:13px 14px;border-radius:12px;background:var(--card-bg);
  border:1.5px solid var(--border);transition:border-color .2s;color:var(--text);font-size:15px;
}
.field-input:focus{border-color:var(--primary);}
.login-btn{
  width:100%;padding:14px;border-radius:12px;margin-top:8px;
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;
  font-weight:800;font-size:.95rem;box-shadow:0 8px 20px rgba(27,166,114,0.3);
  display:flex;align-items:center;justify-content:center;gap:8px;min-height:48px;
}
.login-btn:active{transform:scale(.98);}
.login-btn:disabled{opacity:.6;cursor:not-allowed;}
.login-error{
  background:rgba(230,57,70,0.1);color:var(--red);font-size:.78rem;font-weight:600;
  padding:10px 12px;border-radius:10px;margin-bottom:14px;text-align:center;display:none;
}

/* ══════════════════ DASHBOARD ══════════════════ */
#dashboard{display:none;min-height:100vh;}
.dash-header{
  position:sticky;top:0;z-index:50;padding:14px 18px;
  display:flex;align-items:center;gap:12px;
  border-bottom:1px solid var(--border);
}
.dash-logo{font-weight:900;font-size:1.05rem;color:var(--dark);display:flex;align-items:center;gap:8px;flex-shrink:0;}
.dash-logo .dot{width:9px;height:9px;border-radius:50%;background:var(--primary);box-shadow:0 0 0 3px rgba(27,166,114,0.2);}
.dash-spacer{flex:1;}
.icon-btn{
  width:38px;height:38px;border-radius:11px;background:var(--card-bg);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;color:var(--text);
}
.logout-btn{
  background:rgba(230,57,70,0.1);color:var(--red);font-weight:700;font-size:.78rem;
  padding:9px 14px;border-radius:10px;display:flex;align-items:center;gap:6px;
}

.dash-body{max-width:1100px;margin:0 auto;padding:18px;}

.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px;}
.stat-card{border-radius:16px;padding:14px 16px;}
.stat-num{font-size:1.5rem;font-weight:900;color:var(--dark);}
.stat-label{font-size:.7rem;color:var(--gray);font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-top:2px;}
.stat-card.pending .stat-num{color:var(--yellow);}
.stat-card.paid .stat-num{color:var(--primary);}
.stat-card.rejected .stat-num{color:var(--red);}

.toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.filter-tabs{display:flex;gap:6px;background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:4px;flex-wrap:wrap;}
.filter-tab{padding:8px 14px;border-radius:9px;font-size:.78rem;font-weight:700;color:var(--gray);background:transparent;}
.filter-tab.on{background:var(--primary);color:#fff;}
.search-box{
  flex:1;min-width:200px;display:flex;align-items:center;gap:8px;
  background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:0 14px;
}
.search-box input{flex:1;padding:11px 0;font-size:.85rem;}
.refresh-btn{
  background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:0 16px;
  font-size:.8rem;font-weight:700;color:var(--text);display:flex;align-items:center;gap:6px;
}
.refresh-btn.spinning .ri{animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

#list-wrap{display:flex;flex-direction:column;gap:10px;}
.pv-card{
  border-radius:16px;padding:14px 16px;display:flex;gap:12px;align-items:center;
  cursor:pointer;transition:transform .15s, box-shadow .15s;
  border:1px solid var(--border);background:var(--card-bg);
}
.pv-card:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(0,0,0,0.07);}
.pv-thumb{
  width:54px;height:54px;border-radius:11px;object-fit:cover;flex-shrink:0;background:var(--page-bg);
  border:1px solid var(--border);
}
.pv-thumb.placeholder{display:flex;align-items:center;justify-content:center;font-size:1.4rem;}
.pv-info{flex:1;min-width:0;}
.pv-top-row{display:flex;align-items:center;gap:8px;margin-bottom:2px;}
.pv-name{font-weight:800;font-size:.88rem;color:var(--dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pv-amount{font-weight:800;font-size:.88rem;color:var(--primary);flex-shrink:0;}
.pv-meta{font-size:.74rem;color:var(--gray);display:flex;gap:10px;flex-wrap:wrap;}
.pv-utr{font-family:monospace;background:var(--page-bg);padding:1px 6px;border-radius:6px;}
.pv-badge{
  font-size:.65rem;font-weight:800;padding:4px 10px;border-radius:50px;flex-shrink:0;text-transform:uppercase;letter-spacing:.3px;
}
.pv-badge.pending{background:rgba(255,184,0,0.15);color:#A86A00;}
html[data-theme="dark"] .pv-badge.pending{color:var(--yellow);}
.pv-badge.paid{background:rgba(27,166,114,0.15);color:var(--primary-dark);}
html[data-theme="dark"] .pv-badge.paid{color:var(--primary);}
.pv-badge.rejected{background:rgba(230,57,70,0.12);color:var(--red);}

.empty-state{text-align:center;padding:60px 20px;color:var(--gray);}
.empty-state .ei{font-size:3rem;margin-bottom:10px;}
.loading-row{display:flex;align-items:center;justify-content:center;gap:10px;padding:40px 0;color:var(--gray);font-size:.85rem;}
.spinner{width:18px;height:18px;border-radius:50%;border:2.5px solid var(--border);border-top-color:var(--primary);animation:spin .7s linear infinite;}

/* ══════════════════ DETAIL MODAL ══════════════════ */
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:300;
  display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px);
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.modal-bg.open{opacity:1;pointer-events:all;}
@media(min-width:640px){ .modal-bg{align-items:center;} }
.modal-card{
  width:100%;max-width:480px;max-height:90vh;overflow-y:auto;
  background:var(--card-bg);border-radius:24px 24px 0 0;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.25,.46,.45,.94);
}
@media(min-width:640px){ .modal-card{border-radius:22px;transform:translateY(20px) scale(.96);} }
.modal-bg.open .modal-card{transform:translateY(0) scale(1);}
.modal-head{
  display:flex;align-items:center;justify-content:space-between;padding:16px 18px;
  border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--card-bg);z-index:2;
}
.modal-title{font-weight:800;font-size:1rem;}
.modal-close{width:32px;height:32px;border-radius:50%;background:var(--page-bg);font-size:1rem;display:flex;align-items:center;justify-content:center;}
.modal-body{padding:18px;}
.shot-frame{
  width:100%;border-radius:14px;overflow:hidden;background:var(--page-bg);
  margin-bottom:16px;border:1px solid var(--border);cursor:zoom-in;
  display:flex;align-items:center;justify-content:center;min-height:160px;
}
.shot-frame img{width:100%;display:block;}
.detail-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px dashed var(--border);font-size:.85rem;}
.detail-row:last-child{border-bottom:none;}
.detail-row .dl{color:var(--gray);font-weight:600;}
.detail-row .dv{font-weight:700;color:var(--dark);text-align:right;}
.detail-row .dv.mono{font-family:monospace;}
.action-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px;}
.btn-approve{
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;
  border-radius:13px;padding:14px;font-weight:800;font-size:.88rem;min-height:48px;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.btn-reject{
  background:rgba(230,57,70,0.1);color:var(--red);
  border-radius:13px;padding:14px;font-weight:800;font-size:.88rem;min-height:48px;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.btn-approve:disabled,.btn-reject:disabled{opacity:.5;cursor:not-allowed;}
.reject-box{display:none;margin-top:12px;}
.reject-box textarea{
  width:100%;background:var(--page-bg);border:1.5px solid var(--border);border-radius:12px;
  padding:11px 12px;font-size:.85rem;resize:none;min-height:64px;margin-bottom:10px;color:var(--text);
}
.already-done{
  text-align:center;padding:16px;border-radius:14px;font-weight:700;font-size:.88rem;margin-top:16px;
}
.already-done.paid{background:rgba(27,166,114,0.1);color:var(--primary-dark);}
.already-done.rejected{background:rgba(230,57,70,0.1);color:var(--red);}

.lightbox{
  position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:400;
  display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;
}
.lightbox.open{opacity:1;pointer-events:all;}
.lightbox img{max-width:92vw;max-height:88vh;border-radius:10px;}
.lightbox-close{position:absolute;top:18px;right:18px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.15);color:#fff;font-size:1.2rem;}

.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--dark);color:#fff;padding:12px 22px;border-radius:50px;font-size:.85rem;font-weight:600;
  z-index:999;box-shadow:0 10px 30px rgba(0,0,0,0.3);opacity:0;pointer-events:none;transition:all .3s;
  display:flex;align-items:center;gap:8px;max-width:90%;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.success{background:var(--primary-dark);}
.toast.error{background:var(--red);}

.burst-check{
  width:64px;height:64px;border-radius:50%;background:var(--primary);
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:28px;margin:0 auto 12px;
  animation:burstPop .5s cubic-bezier(.34,1.56,.64,1);
}
@keyframes burstPop{from{transform:scale(0) rotate(-20deg);}to{transform:scale(1) rotate(0);}}

@media(max-width:480px){
  .stats-row{gap:8px;}
  .stat-card{padding:12px;}
  .stat-num{font-size:1.25rem;}
}
</style>
</head>
<body>

<!-- ══════════════ LOGIN ══════════════ -->
<div id="login-screen">
  <div class="login-card glass">
    <div class="login-logo">🔐</div>
    <div class="login-title">Admin Dashboard</div>
    <div class="login-sub">Rinku Kirana — Payment Verification</div>
    <div class="login-error" id="login-error"></div>
    <div class="field-group">
      <label class="field-label">Email</label>
      <input class="field-input" id="login-email" type="email" placeholder="admin@example.com" autocomplete="username"/>
    </div>
    <div class="field-group">
      <label class="field-label">Password</label>
      <input class="field-input" id="login-password" type="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="login-btn" id="login-btn" onclick="handleLogin()">🔑 Login</button>
  </div>
</div>

<!-- ══════════════ DASHBOARD ══════════════ -->
<div id="dashboard">
  <div class="dash-header glass">
    <div class="dash-logo"><span class="dot"></span> Payment Admin</div>
    <div class="dash-spacer"></div>
    <button class="icon-btn" id="theme-btn" onclick="toggleTheme()">🌙</button>
    <button class="logout-btn" onclick="handleLogout()">🚪 Logout</button>
  </div>

  <div class="dash-body">
    <div class="stats-row">
      <div class="stat-card glass pending"><div class="stat-num" id="stat-pending">0</div><div class="stat-label">Pending</div></div>
      <div class="stat-card glass paid"><div class="stat-num" id="stat-paid">0</div><div class="stat-label">Paid</div></div>
      <div class="stat-card glass rejected"><div class="stat-num" id="stat-rejected">0</div><div class="stat-label">Rejected</div></div>
    </div>

    <div class="toolbar">
      <div class="filter-tabs" id="filter-tabs">
        <button class="filter-tab on" data-status="all">All</button>
        <button class="filter-tab" data-status="pending">Pending</button>
        <button class="filter-tab" data-status="paid">Paid</button>
        <button class="filter-tab" data-status="rejected">Rejected</button>
      </div>
      <div class="search-box">
        <span>🔍</span>
        <input id="search-input" placeholder="Search UTR, Order ID, Name, Mobile..."/>
      </div>
      <button class="refresh-btn" id="refresh-btn" onclick="loadList()"><span class="ri">⟳</span> Refresh</button>
    </div>

    <div id="list-wrap">
      <div class="loading-row"><div class="spinner"></div> Loading requests...</div>
    </div>
  </div>
</div>

<!-- ══════════════ DETAIL MODAL ══════════════ -->
<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal-card">
    <div class="modal-head">
      <div class="modal-title">Payment Request</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close">✕</button>
  <img id="lightbox-img" src=""/>
</div>

<div class="toast" id="toast"></div>

<script>
/* ════════════════════════════════════════════════════════════
   CONFIG
   ════════════════════════════════════════════════════════════ */
const SUPABASE_URL = 'https://pffaflasgwhydkmxwkky.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable__tFDYhkM3blZ0pIVT0YxLA_YvkKq79L';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
window.sb = supabase;

let currentList = [];
let currentFilter = 'all';
let currentSearch = '';
let activeItem = null;
let searchDebounce = null;

/* ── Theme ── */
function applyTheme(t){
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('theme-btn').textContent = t === 'dark' ? '☀️' : '🌙';
  try{ localStorage.setItem('rk_admin_theme', t); }catch(e){}
}
function toggleTheme(){
  const cur = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  applyTheme(cur);
}
(function initTheme(){
  let t = 'light';
  try{ t = localStorage.getItem('rk_admin_theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'); }catch(e){}
  applyTheme(t);
})();

/* ── Toast ── */
function showToast(msg, type=''){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  setTimeout(()=>{ el.className = 'toast ' + type; }, 2600);
}

/* ── Auth: Teen checks — Password + Role + is_active ── */
async function handleLogin(){
  const email    = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl    = document.getElementById('login-error');
  const btn      = document.getElementById('login-btn');
  errEl.style.display = 'none';

  if(!email || !password){
    errEl.textContent = 'Email aur password dono zaroori hai';
    errEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = '⏳ Checking...';

  /* ── CHECK 1: Password verify (Supabase Auth) ── */
  const { data, error } = await supabase.auth.signInWithPassword({ email, password });

  if(error){
    errEl.textContent = '❌ Email ya password galat hai';
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = '🔑 Login';
    return;
  }

  /* ── CHECK 2: Role verify (app_metadata) ── */
  if(data.user.app_metadata?.role !== 'admin'){
    await supabase.auth.signOut();
    errEl.textContent = '⛔ Ye account admin nahi hai';
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = '🔑 Login';
    return;
  }

  /* ── CHECK 3: is_active verify (app_metadata) ── */
  if(!data.user.app_metadata?.is_active){
    await supabase.auth.signOut();
    errEl.textContent = '⛔ Ye admin account deactivate hai';
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = '🔑 Login';
    return;
  }

  /* ── Teeno check pass — Dashboard open karo ── */
  enterDashboard();
}

async function handleLogout(){
  await supabase.auth.signOut();
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-btn').disabled = false;
  document.getElementById('login-btn').textContent = '🔑 Login';
}

function enterDashboard(){
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  loadList();
  subscribeRealtime();
}

/* ── Session restore on page load (teeno check) ── */
(async function checkSession(){
  const { data: { session } } = await supabase.auth.getSession();
  if(!session?.user) return;

  // Role check
  if(session.user.app_metadata?.role !== 'admin') return;

  // is_active check
  if(!session.user.app_metadata?.is_active) return;

  enterDashboard();
})();

/* ── Realtime ── */
function subscribeRealtime(){
  supabase.channel('pv-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'payment_verifications' }, () => {
      loadList(true);
    })
    .subscribe();
}

/* ── Filter tabs ── */
document.getElementById('filter-tabs').addEventListener('click', (e)=>{
  const btn = e.target.closest('.filter-tab');
  if(!btn) return;
  document.querySelectorAll('.filter-tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  currentFilter = btn.dataset.status;
  loadList();
});

/* ── Search ── */
document.getElementById('search-input').addEventListener('input', (e)=>{
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(()=>{
    currentSearch = e.target.value;
    loadList();
  }, 350);
});

/* ── Load list ── */
async function loadList(silent){
  const wrap = document.getElementById('list-wrap');
  const refreshBtn = document.getElementById('refresh-btn');
  if(!silent) wrap.innerHTML = '<div class="loading-row"><div class="spinner"></div> Loading requests...</div>';
  refreshBtn.classList.add('spinning');

  const data = await window.RKPayment.loadVerifications({ status: currentFilter, search: currentSearch, limit: 200 });
  currentList = data;
  refreshBtn.classList.remove('spinning');
  renderList(data);
  renderStats();
}

function renderStats(){
  const counts = { pending:0, paid:0, rejected:0 };
  window.RKPayment.loadVerifications({status:'all', limit:1000}).then(all=>{
    all.forEach(r=>{ if(counts[r.status]!==undefined) counts[r.status]++; });
    document.getElementById('stat-pending').textContent  = counts.pending;
    document.getElementById('stat-paid').textContent     = counts.paid;
    document.getElementById('stat-rejected').textContent = counts.rejected;
  });
}

function renderList(data){
  const wrap = document.getElementById('list-wrap');
  if(!data.length){
    wrap.innerHTML = `<div class="empty-state"><div class="ei">📭</div><div>Koi payment request nahi mili</div></div>`;
    return;
  }
  wrap.innerHTML = data.map(item => `
    <div class="pv-card" onclick="openModal('${item.id}')">
      ${item.screenshot_url
        ? `<img class="pv-thumb" src="${item.screenshot_url}" loading="lazy"/>`
        : `<div class="pv-thumb placeholder">🧾</div>`}
      <div class="pv-info">
        <div class="pv-top-row">
          <span class="pv-name">${escapeHtml(item.customer_name)}</span>
          <span class="pv-amount">₹${item.amount ?? '—'}</span>
        </div>
        <div class="pv-meta">
          <span>#${escapeHtml(item.order_number || '—')}</span>
          <span class="pv-utr">${escapeHtml(item.utr)}</span>
          <span>${timeAgo(item.created_at)}</span>
        </div>
      </div>
      <span class="pv-badge ${item.status}">${item.status}</span>
    </div>
  `).join('');
}

/* ── Modal ── */
function openModal(id){
  activeItem = currentList.find(i => i.id === id);
  if(!activeItem) return;

  const i = activeItem;
  const body = document.getElementById('modal-body');

  body.innerHTML = `
    <div class="shot-frame" onclick="${i.screenshot_url ? `openLightbox('${i.screenshot_url}')` : ''}">
      ${i.screenshot_url
        ? `<img src="${i.screenshot_url}"/>`
        : `<div style="padding:40px;color:var(--gray);font-size:.85rem;">Screenshot upload nahi hua</div>`}
    </div>
    <div class="detail-row"><span class="dl">Customer</span><span class="dv">${escapeHtml(i.customer_name)}</span></div>
    <div class="detail-row"><span class="dl">Mobile</span><span class="dv mono">${escapeHtml(i.mobile)}</span></div>
    <div class="detail-row"><span class="dl">Order ID</span><span class="dv mono">${escapeHtml(i.order_number || '—')}</span></div>
    <div class="detail-row"><span class="dl">UTR / Txn ID</span><span class="dv mono">${escapeHtml(i.utr)}</span></div>
    <div class="detail-row"><span class="dl">Amount</span><span class="dv">₹${i.amount ?? '—'}</span></div>
    <div class="detail-row"><span class="dl">Submitted</span><span class="dv">${new Date(i.created_at).toLocaleString('en-IN')}</span></div>

    ${i.status === 'pending' ? `
      <div class="action-row">
        <button class="btn-approve" id="approve-btn" onclick="doApprove()">✅ Approve</button>
        <button class="btn-reject" id="reject-toggle-btn" onclick="toggleRejectBox()">❌ Reject</button>
      </div>
      <div class="reject-box" id="reject-box">
        <textarea id="reject-reason" placeholder="Reject karne ki wajah (optional) — jaise 'amount match nahi hua'"></textarea>
        <button class="btn-reject" style="width:100%" id="confirm-reject-btn" onclick="doReject()">Reject Confirm Karein</button>
      </div>
    ` : i.status === 'paid' ? `
      <div class="already-done paid">✅ Approved — Order Confirmed</div>
    ` : `
      <div class="already-done rejected">❌ Rejected ${i.admin_note ? '— ' + escapeHtml(i.admin_note) : ''}</div>
    `}
  `;

  document.getElementById('modal-bg').classList.add('open');
}

function closeModal(){
  document.getElementById('modal-bg').classList.remove('open');
  activeItem = null;
}

function toggleRejectBox(){
  const box = document.getElementById('reject-box');
  box.style.display = box.style.display === 'block' ? 'none' : 'block';
}

/* ── Approve / Reject ── */
async function doApprove(){
  if(!activeItem) return;
  const btn = document.getElementById('approve-btn');
  btn.disabled = true; btn.textContent = '⏳ Approving...';

  const ok = await window.RKPayment.approvePayment(activeItem.id, activeItem.order_id);

  if(ok){
    closeModal();
    showSuccessBurst('Payment Approved! Order Confirmed ✅');
    showToast('Payment approve ho gaya — order confirmed!', 'success');
    loadList(true);
  } else {
    btn.disabled = false; btn.textContent = '✅ Approve';
    showToast('Kuch error aaya, dobara try karein', 'error');
  }
}

async function doReject(){
  if(!activeItem) return;
  const reason = document.getElementById('reject-reason').value.trim();
  const btn = document.getElementById('confirm-reject-btn');
  btn.disabled = true; btn.textContent = 'Rejecting...';

  const ok = await window.RKPayment.rejectPayment(activeItem.id, reason);

  if(ok){
    closeModal();
    showToast('Payment reject kar diya gaya', 'error');
    loadList(true);
  } else {
    btn.disabled = false; btn.textContent = 'Reject Confirm Karein';
    showToast('Kuch error aaya, dobara try karein', 'error');
  }
}

function showSuccessBurst(msg){
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:500;display:flex;align-items:center;justify-content:center;';
  overlay.innerHTML = `
    <div style="background:var(--card-bg);border-radius:20px;padding:32px 28px;text-align:center;max-width:300px;">
      <div class="burst-check">✓</div>
      <div style="font-weight:800;font-size:.95rem;color:var(--dark);">${msg}</div>
    </div>`;
  document.body.appendChild(overlay);
  setTimeout(()=> overlay.remove(), 1800);
  overlay.onclick = () => overlay.remove();
}

/* ── Lightbox ── */
function openLightbox(url){
  document.getElementById('lightbox-img').src = url;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox(){
  document.getElementById('lightbox').classList.remove('open');
}

/* ── Helpers ── */
function escapeHtml(s){
  return String(s ?? '').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function timeAgo(iso){
  const diff = (Date.now() - new Date(iso).getTime()) / 1000;
  if(diff < 60) return 'abhi';
  if(diff < 3600) return Math.floor(diff/60) + ' min pehle';
  if(diff < 86400) return Math.floor(diff/3600) + ' ghante pehle';
  return Math.floor(diff/86400) + ' din pehle';
}
</script>
