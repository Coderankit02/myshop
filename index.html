*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --primary:#1BA672;--primary-dark:#158A5E;--primary-light:#E8F8F1;
  --orange:#FF6B35;--yellow:#FFB800;--red:#E63946;--blue:#3B82F6;--purple:#8B5CF6;

  --shadow-xl:0 12px 32px rgba(0,0,0,.16);
  --ease-standard:cubic-bezier(.4,0,.2,1);--dur-fast:150ms;--dur-base:200ms;--dur-slow:300ms;
  --focus-ring:0 0 0 3px rgba(27,166,114,.35);
}
html{-webkit-text-size-adjust:100%;}
body{font-family:'Inter',sans-serif;background:#F5F5F5;color:var(--text);margin:0;min-height:100vh;overflow-x:hidden;}
button{cursor:pointer;border:none;outline:none;font-family:'Inter',sans-serif;}
input,select,textarea{outline:none;border:none;font-family:'Inter',sans-serif;font-size:16px;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:#f1f1f1;}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px;}

.dh-getapp-btn{background:var(--primary-light);color:var(--primary-dark);border-radius:10px;padding:10px 14px;font-weight:700;font-size:0.82rem;display:flex;align-items:center;gap:6px;cursor:pointer;border:none;white-space:nowrap;}

.bn-getapp-icon{font-size:1.2rem;}

.dh-inner{max-width:1280px;margin:0 auto;padding:14px 28px;display:flex;align-items:center;gap:16px;}

.dh-location{display:flex;flex-direction:column;align-items:flex-start;justify-content:center;gap:1px;background:#F7FAFC;border:1.5px solid var(--border);border-radius:10px;padding:7px 14px;cursor:pointer;flex-shrink:0;max-width:190px;min-width:0;}

.dh-cart-btn{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;border-radius:10px;padding:10px 18px;font-weight:700;font-size:0.88rem;display:flex;align-items:center;gap:8px;box-shadow:0 4px 12px rgba(27,166,114,0.3);}

/* Apply saved/preferred theme BEFORE paint to avoid a light->dark flash on load.
   This does not touch any backend logic — purely cosmetic, runs once. */
(function(){
  try{
    var saved=localStorage.getItem('rk_theme');
    var theme=(saved==='dark'||saved==='light')?saved:(window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
    document.documentElement.setAttribute('data-theme',theme);
  }catch(e){}
})();
</script>
